[agent]
  interval = "10s"
  flush_interval = "10s"
  omit_hostname = true

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "ferm"
  bucket = "fermenter"

# --- telemetry: all-numeric sensor stream -> measurement "telemetry" ---
[[inputs.mqtt_consumer]]
  servers  = ["tcp://mosquitto:1883"]
  topics   = ["fermenter/telemetry"]
  username = "telegraf"
  password = "${MQTT_PASS}"
  data_format = "json_v2"
  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "telemetry"
    [[inputs.mqtt_consumer.json_v2.object]]
      path = "@this"
      disable_prepend_keys = true

# --- state: numeric + bool + string -> measurement "state" ---
# Separate measurement: a measurement must have consistent field types, and
# state mixes floats, booleans and strings (which only json_v2 can parse).
[[inputs.mqtt_consumer]]
  servers  = ["tcp://mosquitto:1883"]
  topics   = ["fermenter/state"]
  username = "telegraf"
  password = "${MQTT_PASS}"
  data_format = "json_v2"
  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "state"
    [[inputs.mqtt_consumer.json_v2.object]]
      path = "@this"
      disable_prepend_keys = true

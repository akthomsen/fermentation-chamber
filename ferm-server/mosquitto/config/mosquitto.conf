persistence true
persistence_location /mosquitto/data/
log_dest stdout

# Native MQTT for the ESP32, Telegraf and the FastAPI backend.
# The browser no longer connects directly — it goes through the backend's
# WebSocket relay — so there is no MQTT-over-WebSocket listener.
listener 1883
protocol mqtt

allow_anonymous false
password_file /mosquitto/config/passwords
acl_file /mosquitto/config/acl

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fermentation chamber</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mqtt@5/dist/mqtt.min.js"></script>
  <style>
    :root {
      --bg:#0f1115; --card:#1a1d24; --line:#2a2f3a; --txt:#e6e8ec;
      --muted:#8b929f; --accent:#d85a30; --blue:#4a90e2; --ok:#1d9e75; --bad:#b32424;
    }
    * { box-sizing: border-box; }
    body {
      margin:0; background:var(--bg); color:var(--txt);
      font:15px/1.5 system-ui, -apple-system, sans-serif; padding:16px; max-width:980px;
      margin-inline:auto;
    }
    header { display:flex; align-items:baseline; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
    h1 { font-size:1.25rem; margin:0; }
    #status { font-size:.85rem; color:var(--muted); }
    #status.up   { color:var(--ok); }
    #status.down { color:var(--bad); }
    .grid { display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); margin-bottom:12px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
    .card h2 { font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 0 6px; font-weight:600; }
    .stat { font-size:28px; font-weight:500; font-variant-numeric:tabular-nums; }
    .stat small { font-size:14px; color:var(--muted); }
    .sub { font-size:.8rem; color:var(--muted); margin-top:2px; }
    .dots { display:flex; gap:16px; margin-top:4px; }
    .dotrow { display:flex; align-items:center; gap:7px; font-size:.85rem; color:var(--muted); }
    .dot { width:11px; height:11px; border-radius:50%; background:var(--line); transition:background .15s; }
    .dot.on { background:var(--accent); box-shadow:0 0 8px var(--accent); }
    #temp-card, #hum-card { padding:14px 12px 8px; margin-top:12px; }
    #chart-temp, #chart-hum { max-width:100%; overflow-x:auto; }
    .legend { display:flex; flex-wrap:wrap; gap:16px; padding:8px 6px 2px; font-size:.82rem; color:var(--muted); }
    .legend span { display:inline-flex; align-items:center; gap:7px; }
    .legend i { width:20px; border-top:3px solid; display:inline-block; }
    .legend i.dash { border-top-width:2px; border-top-style:dashed; }
    .controls { display:flex; flex-wrap:wrap; gap:18px; align-items:flex-end; }
    .field { display:flex; flex-direction:column; gap:5px; }
    .field label { font-size:.78rem; color:var(--muted); }
    .stepper { display:flex; align-items:stretch; }
    .stepper button { width:42px; font-size:20px; background:var(--bg); color:var(--txt); border:1px solid var(--line); }
    .stepper button:first-child { border-radius:8px 0 0 8px; }
    .stepper button:last-child  { border-radius:0 8px 8px 0; }
    .stepper input {
      width:74px; text-align:center; font-size:18px; font-variant-numeric:tabular-nums;
      background:var(--bg); color:var(--txt); border:1px solid var(--line); border-left:0; border-right:0;
    }
    button { cursor:pointer; padding:10px 18px; border:0; border-radius:8px; background:var(--accent); color:#fff; font-size:15px; }
    button:active { transform:translateY(1px); }
    button.ghost { background:transparent; color:var(--txt); border:1px solid var(--line); }
    #apply { align-self:flex-end; }
    #power { min-width:120px; }
    #power.stopped { background:var(--ok); }
    .spacer { flex:1; }
  </style>
</head>
<body>
  <header>
    <h1>Fermentation chamber</h1>
    <span id="status" class="down">connecting…</span>
  </header>

  <!-- Status cards (driven by retained fermenter/state) -->
  <div class="grid">
    <div class="card">
      <h2>Temperature</h2>
      <div class="stat"><span id="v-temp">–</span><small> °C</small></div>
      <div class="sub">set <span id="v-temp-set">–</span> °C · ceil <span id="v-ceil">–</span></div>
    </div>
    <div class="card">
      <h2>Humidity</h2>
      <div class="stat"><span id="v-hum">–</span><small> %</small></div>
      <div class="sub">set <span id="v-hum-set">–</span> %</div>
    </div>
    <div class="card">
      <h2>Fan</h2>
      <div class="stat"><span id="v-fan">–</span><small> %</small></div>
    </div>
    <div class="card">
      <h2>Actuators</h2>
      <div class="dots">
        <span class="dotrow"><span id="dot-heater" class="dot"></span>Heater</span>
        <span class="dotrow"><span id="dot-humid" class="dot"></span>Humid.</span>
      </div>
      <div class="sub" id="v-halted" style="margin-top:8px">—</div>
    </div>
  </div>

  <!-- Live charts (driven by un-retained fermenter/telemetry) -->
  <div class="card" id="temp-card">
    <h2>Temperature — Inside vs Ambient</h2>
    <div id="chart-temp"></div>
    <div class="legend">
      <span><i style="border-color:#d85a30"></i>Inside</span>
      <span><i style="border-color:#e0b020"></i>Ambient</span>
      <span><i class="dash" style="border-color:#d85a30"></i>Target</span>
      <span><i class="dash" style="border-color:#b32424"></i>Ceiling</span>
    </div>
  </div>
  <div class="card" id="hum-card">
    <h2>Humidity</h2>
    <div id="chart-hum"></div>
    <div class="legend">
      <span><i style="border-color:#4a90e2"></i>Humidity</span>
      <span><i class="dash" style="border-color:#4a90e2"></i>Target</span>
    </div>
  </div>

  <!-- Controls: publish to fermenter/cmd/setpoint and fermenter/cmd/control -->
  <div class="card" style="margin-top:12px">
    <h2>Controls</h2>
    <div class="controls">
      <div class="field">
        <label for="in-temp">Target temp °C</label>
        <div class="stepper">
          <button type="button" data-step="-0.5" data-target="in-temp">−</button>
          <input id="in-temp" type="number" step="0.5" min="0" max="45">
          <button type="button" data-step="0.5" data-target="in-temp">+</button>
        </div>
      </div>
      <div class="field">
        <label for="in-hum">Target humidity %</label>
        <div class="stepper">
          <button type="button" data-step="-1" data-target="in-hum">−</button>
          <input id="in-hum" type="number" step="1" min="0" max="100">
          <button type="button" data-step="1" data-target="in-hum">+</button>
        </div>
      </div>
      <button id="apply">Apply</button>
      <span class="spacer"></span>
      <button id="power" class="ghost">Stop</button>
    </div>
  </div>

  <script>
    // ---- elements --------------------------------------------------------
    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");
    const tempInput = $("in-temp"), humInput = $("in-hum");
    const powerBtn = $("power");
    let halted = false; // last reported halted state, drives the power button

    // Inputs the user has edited but not yet applied. While an input is dirty we
    // stop seeding it from fermenter/state, so the ~1 Hz state echo can't clobber
    // a value mid-edit. Cleared on Apply, after which the device echo re-syncs it.
    const dirty = new Set();
    [tempInput, humInput].forEach((el) =>
      el.addEventListener("input", () => dirty.add(el.id)));

    function setStatus(text, up) {
      statusEl.textContent = text;
      statusEl.className = up ? "up" : "down";
    }

    // ---- uPlot: two charts, temperature (Inside + Ambient) and humidity --
    const WINDOW_SEC = 300;     // sliding view width: always show the last 5 min
    const MAX = 1800;           // hard cap on retained points (~30 min @ 1 msg/s)
    let xs = [], tIn = [], tAmb = [], hum = [];

    const GRID = { stroke: "#2a2f3a" };
    function chartWidth(cardId) { return Math.max(280, $(cardId).clientWidth - 26); }

    // Both charts share one sliding x-range: [latest - WINDOW, latest]. This is
    // what makes the plot scroll instead of staying pinned to session start.
    function xRange() {
      const last = xs.length ? xs[xs.length - 1] : Date.now() / 1000;
      return [last - WINDOW_SEC, last];
    }
    const xScale = { time: true, range: () => xRange() };
    const xAxis = () => ({ stroke: "#8b929f", grid: GRID, ticks: GRID });

    // Latest setpoints from fermenter/state; the threshold lines read these.
    const sp = { targetTemp: null, targetHumidity: null, targetCeiling: null };

    // y-range that always includes a (dynamic) target value, so the setpoint
    // line stays on-screen even while the reading is still far from target.
    function rangeWith(getTarget) {
      return (u, dataMin, dataMax) => {
        const t = getTarget();
        let lo = dataMin, hi = dataMax;
        if (lo == null || hi == null) {            // no data yet
          if (t == null || isNaN(t)) return [0, 1];
          lo = hi = t;
        }
        if (t != null && !isNaN(t)) { lo = Math.min(lo, t); hi = Math.max(hi, t); }
        if (lo === hi) { lo -= 1; hi += 1; }
        const pad = (hi - lo) * 0.1;
        return [lo - pad, hi + pad];
      };
    }

    // uPlot has no built-in threshold line; this draw-hook plugin renders
    // horizontal lines at given scale values (the setpoints). Identification is
    // left to the legend below the chart, not text drawn on the line.
    function hLines(getLines) {
      return { hooks: { draw: (u) => {
        const { ctx } = u, { left, top, width, height } = u.bbox;
        ctx.save();
        ctx.lineWidth = 1;
        for (const ln of getLines()) {
          if (ln.value == null || isNaN(ln.value)) continue;
          const y = u.valToPos(ln.value, ln.scale, true);
          if (y < top || y > top + height) continue; // off-screen, skip
          ctx.beginPath();
          ctx.setLineDash(ln.dash || []);
          ctx.strokeStyle = ln.color;
          ctx.moveTo(left, y); ctx.lineTo(left + width, y); ctx.stroke();
        }
        ctx.restore();
      } } };
    }

    const uTemp = new uPlot({
      width: chartWidth("temp-card"), height: 260,
      legend: { show: false }, // using the custom legend strip below the chart
      scales: { x: xScale, C: { range: rangeWith(() => sp.targetTemp) } },
      series: [
        {},
        { label: "Inside °C",  stroke: "#d85a30", scale: "C", width: 2 },
        { label: "Ambient °C", stroke: "#e0b020", scale: "C", width: 2 },
      ],
      axes: [ xAxis(), { scale: "C", stroke: "#8b929f", grid: GRID, ticks: GRID } ],
      plugins: [ hLines(() => [
        { scale: "C", value: sp.targetTemp,    color: "#d85a30", dash: [6, 4] },
        { scale: "C", value: sp.targetCeiling, color: "#b32424", dash: [2, 4] },
      ]) ],
    }, [xs, tIn, tAmb], $("chart-temp"));

    const uHum = new uPlot({
      width: chartWidth("hum-card"), height: 200,
      legend: { show: false },
      scales: { x: xScale, "%": { range: rangeWith(() => sp.targetHumidity) } },
      series: [
        {},
        { label: "Humidity %", stroke: "#4a90e2", scale: "%", width: 2 },
      ],
      axes: [ xAxis(), { scale: "%", stroke: "#8b929f", grid: GRID, ticks: GRID } ],
      plugins: [ hLines(() => [
        { scale: "%", value: sp.targetHumidity, color: "#4a90e2", dash: [6, 4] },
      ]) ],
    }, [xs, hum], $("chart-hum"));

    addEventListener("resize", () => {
      uTemp.setSize({ width: chartWidth("temp-card"), height: 260 });
      uHum.setSize({ width: chartWidth("hum-card"), height: 200 });
    });

    // ---- telemetry: live points ------------------------------------------
    function pushPoint(d) {
      xs.push(Date.now() / 1000);
      tIn.push(d.dsTemp); tAmb.push(d.bmeTemp); hum.push(d.humidity);
      if (xs.length > MAX) { xs.shift(); tIn.shift(); tAmb.shift(); hum.shift(); }
      uTemp.setData([xs, tIn, tAmb]);
      uHum.setData([xs, hum]);
      $("v-temp").textContent = d.dsTemp.toFixed(2);
      $("v-hum").textContent  = d.humidity.toFixed(1);
    }

    // ---- state: status cards + seed controls (without fighting the user) -
    function applyState(d) {
      $("v-temp-set").textContent = d.targetTemp.toFixed(1);
      $("v-hum-set").textContent  = d.targetHumidity.toFixed(0);
      $("v-ceil").textContent     = d.targetCeiling.toFixed(1);
      $("v-fan").textContent      = d.fanDuty;
      $("dot-heater").classList.toggle("on", d.heaterOn);
      $("dot-humid").classList.toggle("on", d.humidOn);

      // Feed the threshold lines and redraw so they track a changed setpoint
      // immediately (the y-range also keys off these, so a redraw re-frames).
      sp.targetTemp = d.targetTemp;
      sp.targetHumidity = d.targetHumidity;
      sp.targetCeiling = d.targetCeiling;
      uTemp.redraw(true, true); uHum.redraw(true, true); // recalc axes -> re-frame

      halted = d.halted;
      $("v-halted").textContent = halted ? "⏸ Halted" : "▶ Running";
      powerBtn.textContent = halted ? "Start" : "Stop";
      powerBtn.classList.toggle("stopped", halted);

      // Only seed an input the user has not edited since the last Apply.
      if (!dirty.has("in-temp")) tempInput.value = d.targetTemp;
      if (!dirty.has("in-hum"))  humInput.value  = d.targetHumidity;
    }

    // ---- MQTT over WebSocket ---------------------------------------------
    const url = `ws://${location.hostname}:9001`;
    const client = mqtt.connect(url);
    client.on("connect", () => {
      setStatus(`connected — ${url}`, true);
      client.subscribe("fermenter/telemetry");
      client.subscribe("fermenter/state");
    });
    client.on("reconnect", () => setStatus("reconnecting…", false));
    client.on("close",     () => setStatus("disconnected", false));
    client.on("error",     (e) => setStatus("error: " + e.message, false));
    client.on("message", (topic, payload) => {
      let d; try { d = JSON.parse(payload.toString()); } catch { return; }
      if (topic === "fermenter/telemetry") pushPoint(d);
      else if (topic === "fermenter/state") applyState(d);
    });

    // ---- controls --------------------------------------------------------
    document.querySelectorAll(".stepper button").forEach((b) => {
      b.addEventListener("click", () => {
        const input = $(b.dataset.target);
        input.value = (parseFloat(input.value || 0) + parseFloat(b.dataset.step)).toFixed(1);
        dirty.add(input.id); // a stepper press is an edit too
      });
    });

    $("apply").addEventListener("click", () => {
      // Confirmation is the fermenter/state echo, not this click.
      client.publish("fermenter/cmd/setpoint", JSON.stringify({
        targetTemp: parseFloat(tempInput.value),
        targetHumidity: parseFloat(humInput.value),
      }));
      dirty.clear(); // hand the fields back to the device's echoed truth
    });

    powerBtn.addEventListener("click", () => {
      // Mirrors the physical knob: start (resets run timer) vs stop.
      client.publish("fermenter/cmd/control", JSON.stringify({
        action: halted ? "start" : "stop",
      }));
    });
  </script>
</body>
</html>
